name: Security Audit

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/FolhaNova

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Composer audit
        run: composer audit --locked

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/FolhaNova/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: NPM audit
        run: npm audit --audit-level=high
